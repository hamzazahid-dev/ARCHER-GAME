<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Archery Game</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #1e1b4b;
        font-family: sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      svg#game {
        width: 100%;
        height: 100%;
        touch-action: none;
        -webkit-touch-callout: none;
      }

      span.instruction {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        color: #ffffff;
        font-size: 14px;
        letter-spacing: 1px;
        pointer-events: none;
        opacity: 0.8;
        background: rgba(0, 0, 0, 0.3);
        padding: 6px 14px;
        border-radius: 15px;
        white-space: nowrap;
      }

      .feedback-text {
        font-weight: bold;
        font-size: 36px;
        text-anchor: middle;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <svg id="game" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 400" overflow="visible">
      <defs>
        <!-- Background Gradient -->
        <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1e1b4b" />
          <stop offset="60%" stop-color="#431407" />
          <stop offset="100%" stop-color="#78350f" />
        </linearGradient>

        <!-- Sun Glow for Target Backdrop -->
        <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.8" />
          <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
        </radialGradient>

        <!-- Trajectory Arc Gradient -->
        <linearGradient id="ArcGradient">
          <stop offset="0" stop-color="#fff" stop-opacity=".4"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
        </linearGradient>

        <!-- Pure Arrow Definition -->
        <g id="arrow">
          <line x2="60" fill="none" stroke="#e2e8f0" stroke-width="2" />
          <polygon fill="#cbd5e1" points="64 0 58 3 58 -3" />
          <polygon fill="#ef4444" points="2 -4 -4 -4 -1 0 -4 4 2 4 5 0" />
        </g>
      </defs>

      <!-- Clean Background -->
      <rect x="-200" y="-100" width="1400" height="600" fill="url(#skyGradient)" />
      <circle cx="900" cy="250" r="180" fill="url(#sunGlow)" />

      <!-- Aiming Arc Trajectory -->
      <path id="arc" fill="none" stroke="url(#ArcGradient)" stroke-width="3" stroke-dasharray="6,4" d="M100,250c250-400,550-400,800,0" pointer-events="none"/>

      <!-- Clean Target Circles -->
      <g id="target" transform="translate(900, 250) rotate(-30)">
        <ellipse cx="0" cy="0" rx="40" ry="80" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <ellipse cx="0" cy="0" rx="30" ry="60" fill="#000000"/>
        <ellipse cx="0" cy="0" rx="20" ry="40" fill="#3b82f6"/>
        <ellipse cx="0" cy="0" rx="10" ry="20" fill="#ef4444"/>
        <ellipse cx="0" cy="0" rx="4" ry="8" fill="#eab308"/>
      </g>

      <!-- Bow -->
      <g id="bow" fill="none" stroke-linecap="round" vector-effect="non-scaling-stroke" pointer-events="none">
        <polyline fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" points="88,200 88,250 88,300"/>
        <path fill="none" stroke="#eab308" stroke-width="4" stroke-linecap="round" d="M88,300 c0-10.1,12-25.1,12-50s-12-39.9-12-50"/>
      </g>

      <!-- Loaded Arrow -->
      <g class="arrow-angle"><use x="100" y="250" xlink:href="#arrow"/></g>

      <!-- Fired Arrows Container -->
      <g class="arrows" pointer-events="none"></g>

      <!-- Clean Text Feedback (Replaced author custom path glyphs with standard text) -->
      <text class="miss feedback-text" x="500" y="150" fill="#94a3b8" opacity="0">MISS!</text>
      <text class="hit feedback-text" x="500" y="150" fill="#eab308" opacity="0">HIT!</text>
      <text class="bullseye feedback-text" x="500" y="150" fill="#ef4444" opacity="0">BULLSEYE!</text>
    </svg>

    <span class="instruction">Pull back and release to shoot!</span>

    <!-- Dependency Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.19.1/TweenMax.min.js"></script>

    <!-- Game Logic -->
    <script>
      var svg = document.querySelector("svg");
      var cursor = svg.createSVGPoint();
      var arrows = document.querySelector(".arrows");
      var randomAngle = 0;

      var target = { x: 900, y: 250 };
      var lineSegment = { x1: 880, y1: 290, x2: 920, y2: 210 };
      var pivot = { x: 100, y: 250 };

      var isDragging = false;
      var dragStart = { x: 0, y: 0 };
      var currentBezierPoints = null;

      svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

      window.addEventListener("pointerdown", startDrag);
      window.addEventListener("touchstart", startDrag, { passive: false });

      function startDrag(e) {
        if (e.cancelable) e.preventDefault();

        var point = getMouseSVG(e);
        if (!point) return;

        isDragging = true;
        dragStart.x = point.x;
        dragStart.y = point.y;

        randomAngle = (Math.random() * Math.PI * 0.02) - 0.01;
        TweenMax.set(".arrow-angle use", { opacity: 1 });

        window.addEventListener("pointermove", aim, { passive: false });
        window.addEventListener("touchmove", aim, { passive: false });
        window.addEventListener("pointerup", loose);
        window.addEventListener("touchend", loose);

        aim(e);
      }

      function aim(e) {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault();

        var currentPoint = getMouseSVG(e);
        if (!currentPoint) return;

        var dragDx = currentPoint.x - dragStart.x;
        var dragDy = currentPoint.y - dragStart.y;

        var dx = -dragDx;
        var dy = -dragDy;

        if (Math.abs(dx) < 2 && Math.abs(dy) < 2) {
          dx = -1;
          dy = 0;
        }

        var angle = Math.atan2(dy, dx) + randomAngle;
        var bowAngle = angle;

        var dragDistance = Math.sqrt((dragDx * dragDx) + (dragDy * dragDy));
        var distance = Math.min(dragDistance, 50);
        var scale = Math.min(Math.max(distance / 30, 1), 2);

        TweenMax.set("#bow", {
          scaleX: scale,
          rotation: bowAngle + "rad",
          transformOrigin: "right center"
        });

        TweenMax.set(".arrow-angle", {
          rotation: bowAngle + "rad",
          svgOrigin: "100 250"
        });

        TweenMax.set(".arrow-angle use", {
          x: -distance
        });

        TweenMax.set("#bow polyline", {
          attr: {
            points: "88,200 " + Math.min(pivot.x - ((1 / scale) * distance), 88) + ",250 88,300"
          }
        });

        var radius = distance * 9;
        var offset = {
          x: (Math.cos(bowAngle) * radius),
          y: (Math.sin(bowAngle) * radius)
        };
        var arcWidth = offset.x * 3;

        currentBezierPoints = {
          p0: { x: 100, y: 250 },
          p1: { x: 100 + offset.x, y: 250 + offset.y },
          p2: { x: 100 + arcWidth - offset.x, y: 250 + offset.y + 50 },
          p3: { x: 100 + arcWidth, y: 300 }
        };

        TweenMax.set("#arc", {
          attr: {
            d: "M100,250c" + offset.x + "," + offset.y + "," + (arcWidth - offset.x) + "," + (offset.y + 50) + "," + arcWidth + ",50"
          },
          autoAlpha: distance / 60
        });
      }

      function getBezierPoint(t, p0, p1, p2, p3) {
        var u = 1 - t;
        var tt = t * t;
        var uu = u * u;
        var uuu = uu * u;
        var ttt = tt * t;

        var x = uuu * p0.x + 3 * uu * t * p1.x + 3 * u * tt * p2.x + ttt * p3.x;
        var y = uuu * p0.y + 3 * uu * t * p1.y + 3 * u * tt * p2.y + ttt * p3.y;
        return { x: x, y: y };
      }

      function loose(e) {
        if (!isDragging) return;
        isDragging = false;

        window.removeEventListener("pointermove", aim);
        window.removeEventListener("touchmove", aim);
        window.removeEventListener("pointerup", loose);
        window.removeEventListener("touchend", loose);

        TweenMax.to("#bow", 0.3, {
          scaleX: 1,
          transformOrigin: "right center",
          ease: Elastic.easeOut
        });
        TweenMax.to("#bow polyline", 0.3, {
          attr: { points: "88,200 88,250 88,300" },
          ease: Elastic.easeOut
        });

        var newArrow = document.createElementNS("http://www.w3.org/2000/svg", "use");
        newArrow.setAttributeNS('http://www.w3.org/1999/xlink', 'href', "#arrow");
        arrows.appendChild(newArrow);

        var flightProgress = { t: 0 };
        var bp = currentBezierPoints;

        TweenMax.to(flightProgress, 0.5, {
          t: 1,
          ease: Linear.easeNone,
          onUpdate: function() {
            var curr = getBezierPoint(flightProgress.t, bp.p0, bp.p1, bp.p2, bp.p3);
            var next = getBezierPoint(Math.min(flightProgress.t + 0.01, 1), bp.p0, bp.p1, bp.p2, bp.p3);
            var angleDeg = Math.atan2(next.y - curr.y, next.x - curr.x) * (180 / Math.PI);

            newArrow._gsTransform = { x: curr.x, y: curr.y, rotation: angleDeg };
            TweenMax.set(newArrow, {
              x: curr.x,
              y: curr.y,
              rotation: angleDeg,
              transformOrigin: "0px 0px"
            });

            hitTest({ target: [newArrow] }, this);
          },
          onComplete: onMiss
        });

        TweenMax.to("#arc", 0.2, { opacity: 0 });
        TweenMax.set(".arrow-angle use", { opacity: 0 });
      }

      function hitTest(tweenObj, flightTween) {
        var arrow = tweenObj.target[0];
        var transform = arrow._gsTransform;
        if (!transform) return;

        var radians = transform.rotation * Math.PI / 180;
        var arrowSegment = {
          x1: transform.x,
          y1: transform.y,
          x2: (Math.cos(radians) * 60) + transform.x,
          y2: (Math.sin(radians) * 60) + transform.y
        };

        var intersection = getIntersection(arrowSegment, lineSegment);
        if (intersection && intersection.segment1 && intersection.segment2) {
          if (flightTween) flightTween.pause();
          var dx = intersection.x - target.x;
          var dy = intersection.y - target.y;
          var distance = Math.sqrt((dx * dx) + (dy * dy));
          var selector = ".hit";
          if (distance < 12) {
            selector = ".bullseye";
          }
          showMessage(selector);
        }
      }

      function onMiss() {
        showMessage(".miss");
      }

      function showMessage(selector) {
        TweenMax.killTweensOf(selector);
        TweenMax.set(selector, { autoAlpha: 1, scale: 0.2, transformOrigin: "center center" });
        TweenMax.to(selector, 0.4, { scale: 1, ease: Back.easeOut });
        TweenMax.to(selector, 0.3, { delay: 1.5, autoAlpha: 0, scale: 0.2 });
      }

      function getMouseSVG(e) {
        var clientX, clientY;

        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length > 0) {
          clientX = e.changedTouches[0].clientX;
          clientY = e.changedTouches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }

        if (clientX === undefined || clientY === undefined) return null;

        var ctm = svg.getScreenCTM();
        if (!ctm) return null;

        cursor.x = clientX;
        cursor.y = clientY;
        return cursor.matrixTransform(ctm.inverse());
      }

      function getIntersection(segment1, segment2) {
        var dx1 = segment1.x2 - segment1.x1;
        var dy1 = segment1.y2 - segment1.y1;
        var dx2 = segment2.x2 - segment2.x1;
        var dy2 = segment2.y2 - segment2.y1;
        var cx = segment1.x1 - segment2.x1;
        var cy = segment1.y1 - segment2.y1;
        var denominator = dy2 * dx1 - dx2 * dy1;
        if (denominator == 0) return null;

        var ua = (dx2 * cy - dy2 * cx) / denominator;
        var ub = (dx1 * cy - dy1 * cx) / denominator;
        return {
          x: segment1.x1 + ua * dx1,
          y: segment1.y1 + ua * dy1,
          segment1: ua >= 0 && ua <= 1,
          segment2: ub >= 0 && ub <= 1
          <head>
  <title>Archery Game</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- THIS OVERRIDES THE TAB / GRID LOGO WITH A CLEAN TARGET ICON -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23ffffff'/><circle cx='50' cy='50' r='35' fill='%23000000'/><circle cx='50' cy='50' r='25' fill='%233b82f6'/><circle cx='50' cy='50' r='15' fill='%23ef4444'/><circle cx='50' cy='50' r='5' fill='%23eab308'/></svg>" />

  <style>
    /* ... rest of your CSS ... */
  </style>
</head>

        };
      }
    </script>
  </body>
</html>
