<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Archery Game Mobile</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #1e1b4b;
        font-family: system-ui, -apple-system, sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }

      svg#game {
        width: 100vw;
        height: 100vh;
        display: block;
        touch-action: none;
      }

      .instruction {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: #ffffff;
        font-size: 14px;
        letter-spacing: 0.5px;
        pointer-events: none;
        opacity: 0.85;
        white-space: nowrap;
        background: rgba(0,0,0,0.3);
        padding: 8px 16px;
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <svg id="game" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 900" preserveAspectRatio="xMidYMid slice">
      <defs>
        <!-- Background Gradient -->
        <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#0f172a" />
          <stop offset="50%" stop-color="#1e1b4b" />
          <stop offset="100%" stop-color="#431407" />
        </linearGradient>

        <!-- Target Glow Backdrop -->
        <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6" />
          <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
        </radialGradient>

        <!-- Trajectory Arc Gradient -->
        <linearGradient id="ArcGradient" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#fff" stop-opacity=".4"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
        </linearGradient>

        <!-- Arrow Definition (Rotated vertically for 9:16 layout) -->
        <g id="arrow">
          <line y2="-60" fill="none" stroke="#ccc" stroke-width="2" />
          <polygon fill="#ffdd00" points="0 -64 -2 -58 0 -56 2 -58" />
          <polygon fill="#88ce02" points="-3 -2 -3 4 0 1 3 4 3 -2 0 -5" />
        </g>
      </defs>

      <!-- Background Atmosphere -->
      <rect x="-100" y="-100" width="700" height="1100" fill="url(#skyGradient)" />
      <circle cx="250" cy="220" r="140" fill="url(#sunGlow)" />

      <!-- Aiming Arc Trajectory -->
      <path id="arc" fill="none" stroke="url(#ArcGradient)" stroke-width="3" stroke-dasharray="6,4" d="M250,750 C250,500 250,300 250,220" pointer-events="none"/>

      <!-- Target (Positioned top-center) -->
      <g id="target" transform="translate(250, 220)">
        <circle r="50" fill="#FFF" />
        <circle r="38" fill="#F4531C" />
        <circle r="26" fill="#FFF" />
        <circle r="14" fill="#F4531C" />
        <circle r="5" fill="#FFCC00" />
      </g>

      <!-- Bow (Positioned bottom-center) -->
      <g id="bow" fill="none" transform="translate(250, 750)" pointer-events="none">
        <polyline fill="none" stroke="#ddd" stroke-width="1.5" points="-50,0 0,0 50,0"/>
        <path fill="none" stroke="#88ce02" stroke-width="4" stroke-linecap="round" d="M-50,0 C-30,-20 30,-20 50,0"/>
      </g>

      <!-- Loaded Arrow -->
      <g class="arrow-angle" transform="translate(250, 750)">
        <use xlink:href="#arrow"/>
      </g>

      <!-- Fired Arrows Container -->
      <g class="arrows" pointer-events="none"></g>

      <!-- Feedback Texts -->
      <g class="miss" fill="#aaa" opacity="0" transform="translate(250, 450) scale(1.2)">
        <text x="0" y="0" text-anchor="middle" font-size="32" font-weight="bold" fill="#f87171">MISS!</text>
      </g>

      <g class="bullseye" fill="#F4531C" opacity="0" transform="translate(250, 450) scale(1.2)">
        <text x="0" y="0" text-anchor="middle" font-size="36" font-weight="bold" fill="#fbbf24">BULLSEYE!</text>
      </g>

      <g class="hit" fill="#ffcc00" opacity="0" transform="translate(250, 450) scale(1.2)">
        <text x="0" y="0" text-anchor="middle" font-size="32" font-weight="bold" fill="#4ade80">NICE HIT!</text>
      </g>
    </svg>

    <span class="instruction">Pull back down and release to shoot!</span>

    <!-- Dependency Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.19.1/TweenMax.min.js"></script>

    <!-- Mobile Game Logic -->
    <script>
      var svg = document.querySelector("svg");
      var cursor = svg.createSVGPoint();
      var arrows = document.querySelector(".arrows");

      var targetPos = { x: 250, y: 220 };
      var pivotPos = { x: 250, y: 750 };

      var isDragging = false;
      var dragStart = { x: 0, y: 0 };

      function startDrag(e) {
        if (e.cancelable) e.preventDefault();

        var point = getMouseSVG(e);
        if (!point) return;

        isDragging = true;
        dragStart.x = point.x;
        dragStart.y = point.y;

        TweenMax.set(".arrow-angle use", { opacity: 1 });

        window.addEventListener("pointermove", aim, { passive: false });
        window.addEventListener("touchmove", aim, { passive: false });
        window.addEventListener("pointerup", loose);
        window.addEventListener("touchend", loose);

        aim(e);
      }

      window.addEventListener("pointerdown", startDrag);
      window.addEventListener("touchstart", startDrag, { passive: false });

      function aim(e) {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault();

        var currentPoint = getMouseSVG(e);
        if (!currentPoint) return;

        var dragDx = currentPoint.x - dragStart.x;
        var dragDy = currentPoint.y - dragStart.y;

        // Pull back mechanic
        var dx = -dragDx;
        var dy = -dragDy;

        if (dy < 5) dy = 5; // Force upward targeting direction

        var angle = Math.atan2(dy, dx) - (Math.PI / 2);
        var dragDistance = Math.sqrt((dragDx * dragDx) + (dragDy * dragDy));
        var distance = Math.min(dragDistance, 70);

        TweenMax.set("#bow", {
          rotation: angle + "rad",
          transformOrigin: "center center"
        });

        TweenMax.set(".arrow-angle", {
          rotation: angle + "rad",
          transformOrigin: "center center"
        });

        TweenMax.set(".arrow-angle use", {
          y: distance
        });

        TweenMax.set("#bow polyline", {
          attr: {
            points: "-50,0 0," + distance + " 50,0"
          }
        });

        // Dynamic arc prediction
        var targetDist = distance * 7;
        var endY = pivotPos.y - targetDist;
        var midX = pivotPos.x + (dx * 1.5);

        TweenMax.set("#arc", {
          attr: {
            d: "M" + pivotPos.x + "," + pivotPos.y + " C" + midX + "," + (pivotPos.y - targetDist * 0.5) + " " + pivotPos.x + "," + endY + " " + pivotPos.x + "," + Math.max(endY, 100)
          },
          autoAlpha: distance / 30
        });
      }

      function loose(e) {
        if (!isDragging) return;
        isDragging = false;

        window.removeEventListener("pointermove", aim);
        window.removeEventListener("touchmove", aim);
        window.removeEventListener("pointerup", loose);
        window.removeEventListener("touchend", loose);

        TweenMax.to("#bow polyline", 0.2, {
          attr: { points: "-50,0 0,0 50,0" },
          ease: Elastic.easeOut
        });

        var currentArrow = document.querySelector(".arrow-angle use");
        var transformVal = document.querySelector(".arrow-angle").getAttribute("transform");
        var match = /rotate\(([^)]+)\)/.exec(transformVal);
        var currentAngle = match ? parseFloat(match[1]) : 0;
        
        var pullDist = parseFloat(currentArrow.getAttribute("y") || 0);

        TweenMax.set(".arrow-angle use", { opacity: 0, y: 0 });

        if (pullDist < 15) return; // Too weak shot

        var firedArrow = document.createElementNS("http://www.w3.org/2000/svg", "use");
        firedArrow.setAttributeNS('http://www.w3.org/1999/xlink', 'href', "#arrow");
        arrows.appendChild(firedArrow);

        var rad = (currentAngle - 90) * Math.PI / 180;
        var flightDist = pullDist * 8;
        var targetX = pivotPos.x + (Math.cos(rad) * flightDist);
        var targetY = pivotPos.y + (Math.sin(rad) * flightDist);

        TweenMax.fromTo(firedArrow, 0.4, {
          x: pivotPos.x,
          y: pivotPos.y,
          rotation: currentAngle
        }, {
          x: targetX,
          y: targetY,
          ease: Linear.easeNone,
          onComplete: function() {
            checkHit(targetX, targetY);
          }
        });

        TweenMax.to("#arc", 0.2, { opacity: 0 });
      }

      function checkHit(x, y) {
        var dx = x - targetPos.x;
        var dy = y - targetPos.y;
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 10) {
          showMessage(".bullseye");
        } else if (dist < 50) {
          showMessage(".hit");
        } else {
          showMessage(".miss");
        }
      }

      function showMessage(selector) {
        TweenMax.killTweensOf(selector);
        TweenMax.set(selector, { autoAlpha: 1, scale: 0.5 });
        TweenMax.to(selector, 0.4, {
          scale: 1.2,
          ease: Back.easeOut
        });
        TweenMax.to(selector, 0.3, {
          delay: 1.2,
          autoAlpha: 0,
          scale: 0.5
        });
      }

      function getMouseSVG(e) {
        var clientX, clientY;

        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length > 0) {
          clientX = e.changedTouches[0].clientX;
          clientY = e.changedTouches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }

        if (clientX === undefined || clientY === undefined) return null;

        var ctm = svg.getScreenCTM();
        if (!ctm) return null;

        cursor.x = clientX;
        cursor.y = clientY;
        return cursor.matrixTransform(ctm.inverse());
      }
    </script>
  </body>
</html>
